<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT Navigator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="brand">
        <div class="brand-logo">
          <img src="icons/icon48.png" alt="" width="36" height="36">
        </div>
        <div class="brand-text">
          <h1 class="brand-title">ChatGPT Navigator</h1>
          <p class="brand-sub">
            <span class="version-pill">v1.0.4</span>
            <span class="dot-sep">·</span>
            <span>Minimap &amp; Sidebar</span>
          </p>
        </div>
      </div>
    </header>

    <div class="divider"></div>

    <!-- Description -->
    <section class="intro">
      <p>Found a bug or have an idea? Let us know — every report makes the extension better.</p>
    </section>

    <!-- Actions -->
    <section class="actions" aria-label="Actions">
      <button id="shareButton" class="btn btn-primary" type="button">
        <span class="btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
          </svg>
        </span>
        <span class="btn-label">Share with friends</span>
        <span class="btn-arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </span>
      </button>

      <a
        href="https://forms.gle/vkH1kRAJEAZCiF6z6"
        target="_blank"
        rel="noopener"
        class="btn btn-ghost"
      >
        <span class="btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 2v4"></path>
            <path d="M16 2v4"></path>
            <rect x="3" y="6" width="18" height="14" rx="3"></rect>
            <path d="M12 11v4"></path>
            <path d="M12 18h.01"></path>
          </svg>
        </span>
        <span class="btn-label">Report a bug</span>
        <span class="btn-arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"></line>
            <polyline points="7 7 17 7 17 17"></polyline>
          </svg>
        </span>
      </a>

      <a
        href="https://forms.gle/pyTzuPQxGz14fW7HA"
        target="_blank"
        rel="noopener"
        class="btn btn-ghost"
      >
        <span class="btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l2.39 6.96H22l-5.8 4.21L18.59 20 12 15.77 5.41 20l2.39-6.83L2 8.96h7.61L12 2z"></path>
          </svg>
        </span>
        <span class="btn-label">Request a feature</span>
        <span class="btn-arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"></line>
            <polyline points="7 7 17 7 17 17"></polyline>
          </svg>
        </span>
      </a>

      <a
        href="https://github.com/basklash/chatgpt-navigator"
        target="_blank"
        rel="noopener"
        class="btn btn-ghost"
      >
        <span class="btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.4-3.9-1.4-.5-1.4-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.8-1.6-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.4-2.3 1.2-3.2-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2 1-.3 2-.4 3-.4s2 .1 3 .4c2.3-1.5 3.3-1.2 3.3-1.2.7 1.6.2 2.8.1 3.1.7.8 1.2 1.9 1.2 3.2 0 4.5-2.7 5.5-5.3 5.8.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/>
          </svg>
        </span>
        <span class="btn-label">View on GitHub</span>
        <span class="btn-arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"></line>
            <polyline points="7 7 17 7 17 17"></polyline>
          </svg>
        </span>
      </a>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>MIT License · Not affiliated with OpenAI</p>
    </footer>

    <!-- Toast -->
    <div id="toast" class="toast" role="status" aria-live="polite">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      <span id="toast-text">Link copied</span>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
